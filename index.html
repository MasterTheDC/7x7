<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>7x7 Guide App</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">イードの永遠の夢路</p>
          <h1>フリップパターンを選択すると、フリップを置くべき場所を盤面上に示します。</h1>
          <p class="subtitle">
            トリッカルの「イードの永遠の夢路」で良さそうな置き方を提示するアプリ。
            手動補正モードにすれば現在のフリップの置かれた状況も加味して提示してくれます。
            十字、バツの字、3x3、縦一列、横一列の各パターンに対応しています。
          </p>
        </div>
        <div class="status-card">
          <div class="status-line">
            <span>ターン</span>
            <strong id="turn-count">0</strong>
          </div>
          <div class="status-line">
            <span>埋まっているマス</span>
            <strong id="filled-count">0 / 49</strong>
          </div>
          <div class="status-line">
            <span>推薦元</span>
            <strong id="recommendation-source">未選択</strong>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="board-panel">
          <div class="panel-head">
            <h2>Board</h2>
            <label class="manual-toggle">
              <input id="manual-mode" type="checkbox" />
              <span>手動補正モード</span>
            </label>
          </div>
          <div id="board" class="board" aria-label="7x7 board"></div>
          <div class="legend">
            <span><i class="legend-box filled"></i>埋め済み</span>
            <span><i class="legend-box recommend"></i>置くべき場所</span>
            <span><i class="legend-box fresh"></i>新規に埋まるマス</span>
          </div>
        </section>

        <section class="control-panel">
          <div class="panel-block">
            <h2>フリップパターン</h2>
            <div id="piece-buttons" class="piece-grid"></div>
          </div>

          <div class="panel-block recommendation-panel">
            <h2>次におくべき場所</h2>
            <div id="recommendation-empty" class="empty-state">
              フリップパターンを選ぶと、だいたい良さそうな1手をここに表示します。
            </div>
            <div id="recommendation-card" class="recommendation-card is-hidden">
              <div class="recommendation-line">
                <span>位置</span>
                <strong id="recommendation-label"></strong>
              </div>
              <div class="recommendation-line">
                <span>新規に埋まる数</span>
                <strong id="recommendation-gain"></strong>
              </div>
              <div class="recommendation-line">
                <span>候補の種類</span>
                <strong id="recommendation-piece"></strong>
              </div>
            </div>
          </div>

          <div class="panel-block actions">
            <button id="confirm-button" class="action-button primary" disabled>確定</button>
            <button id="undo-button" class="action-button">Undo</button>
            <button id="reset-button" class="action-button">Reset</button>
          </div>

          <div class="panel-block">
            <h2>履歴</h2>
            <ol id="history-list" class="history-list"></ol>
          </div>
        </section>
      </main>
    </div>

    <script src="./policy_snapshot.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
